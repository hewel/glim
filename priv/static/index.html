<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LAN Share IM</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <main>
    <h1>LAN Share IM</h1>
    <p>First vertical slice: connect, send <code>peer.hello</code>, receive <code>peer.list</code>.</p>
    <label for="display-name">Display name</label>
    <input id="display-name" maxlength="64" autocomplete="name">
    <button id="connect-button" type="button">Connect</button>
    <p id="status">Disconnected</p>
    <h2>Peers</h2>
    <ul id="peers"></ul>
    <h2>Event log</h2>
    <pre id="log"></pre>
  </main>
  <script src="/assets/app.js" defer></script>
</body>
</html>
